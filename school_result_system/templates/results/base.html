{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ school_name_display }}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="{% static 'css/app.css' %}" rel="stylesheet">
    {% if page_css_path %}
    <link href="{% static page_css_path %}" rel="stylesheet">
    {% endif %}
</head>
<body>

<nav class="navbar navbar-light bg-white border-bottom mb-4">
    <div class="container d-flex align-items-center gap-3">
        <img src="{{ school_logo_url }}" alt="School Badge" width="40" height="40">
        <div>
            <div class="fw-bold">{{ school_name_display }}</div>
            <div class="text-muted small">{{ school_motto_display }}</div>
        </div>
        <div class="ms-auto">
            <button class="btn btn-outline-dark btn-sm d-inline-flex align-items-center gap-2" type="button" id="themeToggle" aria-label="Toggle theme">
                <i class="fa-solid fa-moon" id="themeToggleIcon"></i>
            </button>
        </div>
    </div>
</nav>

<div class="container page-content">
    {% block content %}{% endblock %}
</div>

<footer class="text-center text-muted mt-5 mb-3">
    {{ school_name_display }} · {{ year|default:"2026" }}
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const themeToggle = document.getElementById("themeToggle");
    const themeToggleIcon = document.getElementById("themeToggleIcon");
    const storedTheme = localStorage.getItem("theme");
    const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    const initialTheme = storedTheme || (prefersDark ? "dark" : "light");

    const applyTheme = (theme) => {
      document.body.setAttribute("data-theme", theme);
      document.documentElement.setAttribute("data-bs-theme", theme);
      if (themeToggleIcon) {
        themeToggleIcon.className = theme === "dark" ? "fa-solid fa-sun" : "fa-solid fa-moon";
      }
    };

    applyTheme(initialTheme);
    if (themeToggle) {
      themeToggle.addEventListener("click", () => {
        const current = document.body.getAttribute("data-theme") || "light";
        const next = current === "dark" ? "light" : "dark";
        applyTheme(next);
        localStorage.setItem("theme", next);
      });
    }

    document.querySelectorAll(".select-search").forEach((input) => {
      const targetId = input.getAttribute("data-target");
      const select = document.getElementById(targetId);
      if (!select) return;

      const originalOptions = Array.from(select.options).map((opt) => ({
        value: opt.value,
        text: opt.text,
        selected: opt.selected
      }));

      input.addEventListener("input", () => {
        const q = input.value.toLowerCase().trim();
        select.innerHTML = "";
        originalOptions.forEach((opt) => {
          if (!q || opt.text.toLowerCase().includes(q)) {
            const option = document.createElement("option");
            option.value = opt.value;
            option.text = opt.text;
            option.selected = opt.selected && (!q || opt.text.toLowerCase().includes(q));
            select.appendChild(option);
          }
        });
      });
    });
  });
</script>

</body>
</html>

{% extends "base.html" %}
{% load static %}
{% block title %}Create Invoice{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="waec-card p-4">
      <h4 class="waec-title mb-1">Create Invoice</h4>
      <div class="waec-subtitle mb-3">Assign fees to a student for the session.</div>
      <form method="post" class="row g-3">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="col-12">
          <button class="btn btn-dark w-100">Create</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
